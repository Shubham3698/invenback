<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dameeto | Master Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 p-5 font-sans">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5">
            <div class="bg-[#1e293b] p-8 rounded-2xl shadow-2xl border border-slate-700 sticky top-5">
                <h1 id="form-heading" class="text-3xl font-extrabold text-yellow-500 mb-6 uppercase tracking-wider">Add New Product</h1>
                
                <form id="productForm" class="space-y-4 text-sm">
                    <input type="hidden" id="edit-id"> 
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Target Page</label>
                        <select id="pageType" onchange="loadInventory()" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none focus:ring-1 focus:ring-yellow-500">
                            <option value="trendingData">Trending (tr-)</option>
                            <option value="stickerData">Stickers (st-)</option>
                            <option value="posterData">Posters (pos-)</option>
                            <option value="goodiesData">Goodies (gies-)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Product Title</label>
                            <input type="text" id="title" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none focus:border-yellow-500" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Category Label</label>
                            <input type="text" id="category" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Badge</label>
                            <input type="text" id="badge" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-500 uppercase">Final ₹</label>
                            <input type="number" id="finalPrice" class="w-full p-2 bg-[#0f172a] rounded border border-slate-700 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-500 uppercase">Orig ₹</label>
                            <input type="number" id="originalPrice" class="w-full p-2 bg-[#0f172a] rounded border border-slate-700 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-500 uppercase">Disc %</label>
                            <input type="number" id="discount" class="w-full p-2 bg-[#0f172a] rounded border border-slate-700 outline-none">
                        </div>
                        <div class="col-span-1">
                            <label class="text-[9px] font-bold text-slate-500 uppercase">Rate</label>
                            <input type="number" step="0.1" id="rating" class="w-full p-2 bg-[#0f172a] rounded border border-slate-700 outline-none">
                        </div>
                    </div>

                    <div class="mt-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Stock Count</label>
                        <input type="number" id="stock" value="10" class="w-full p-2 bg-[#0f172a] rounded border border-slate-700 outline-none">
                    </div>

                    <textarea id="shortDesc" placeholder="Short Description" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none h-14"></textarea>
                    <textarea id="longDesc" placeholder="Long Detailed Description..." class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none h-24"></textarea>

                    <div class="space-y-3">
                        <input type="text" id="src" placeholder="Main Image URL" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none" required>
                        <textarea id="subImages" placeholder="Gallery Images (comma separated)" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none h-16 text-xs"></textarea>
                        <input type="text" id="tags" placeholder="Tags (comma separated)" class="w-full p-3 bg-[#0f172a] rounded-lg border border-slate-700 outline-none text-xs">
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="button" id="main-btn" onclick="handleSubmit()" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-xl transition-all shadow-xl uppercase">
                            Add Product 🚀
                        </button>
                        <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-700 hover:bg-slate-600 px-6 rounded-xl font-bold">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-400">Inventory Explorer</h2>
                    <span id="item-count" class="bg-slate-800 px-3 py-1 rounded-full text-xs text-yellow-500 font-bold">0 Items</span>
                </div>
                <div id="inventory" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[85vh] overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000/api/products";

        async function handleSubmit() {
            try {
                const editId = document.getElementById('edit-id').value;
                const btn = document.getElementById('main-btn');
                
                // 🔥 Troubleshooting line (Ye console check karne ke liye)
                console.log("Submit start...");

                const payload = {
                    pageType: document.getElementById('pageType').value,
                    category: document.getElementById('category').value,
                    title: document.getElementById('title').value,
                    shortDesc: document.getElementById('shortDesc').value,
                    longDesc: document.getElementById('longDesc').value,
                    finalPrice: Number(document.getElementById('finalPrice').value) || 0,
                    originalPrice: Number(document.getElementById('originalPrice').value) || 0,
                    discount: Number(document.getElementById('discount').value) || 0,
                    rating: Number(document.getElementById('rating').value) || 4.5,
                    stock: Number(document.getElementById('stock').value) || 10,
                    src: document.getElementById('src').value,
                    badge: document.getElementById('badge').value,
                    subImages: document.getElementById('subImages').value.split(',').map(s => s.trim()).filter(s => s !== ""),
                    tags: document.getElementById('tags').value.split(',').map(s => s.trim()).filter(s => s !== "")
                };

                btn.innerText = "Processing...";
                const endpoint = editId ? `${API}/update/${editId}` : `${API}/add`;
                const method = editId ? 'PUT' : 'POST';

                const res = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await res.json();
                if(result.success) {
                    alert(editId ? "Update Success!" : "Added Success!");
                    resetForm();
                    loadInventory();
                }
            } catch (err) {
                console.error(err);
                alert("Error! Check Console.");
            } finally {
                const btn = document.getElementById('main-btn');
                const editId = document.getElementById('edit-id').value;
                btn.innerText = editId ? "Update Changes 🛠️" : "Add Product 🚀";
            }
        }

        async function loadInventory() {
            const container = document.getElementById('inventory');
            const page = document.getElementById('pageType').value;
            try {
                const res = await fetch(`${API}/${page}`);
                const data = await res.json();
                document.getElementById('item-count').innerText = `${data.length} Items`;
                
                if(data.length === 0) {
                    container.innerHTML = `<p class="col-span-2 text-center text-slate-600 py-10 italic">No products in this category.</p>`;
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 group relative">
                        <img src="${item.src}" class="w-full h-40 object-cover rounded-lg mb-3 shadow-lg">
                        <h4 class="text-sm font-bold truncate">${item.title}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-yellow-500 font-bold text-xs">₹${item.finalPrice}</span>
                            <div class="flex gap-2">
                                <button onclick='startEdit(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="p-2 bg-blue-600/20 text-blue-400 rounded-md hover:bg-blue-600 hover:text-white transition-all text-[10px] font-bold">EDIT</button>
                                <button onclick="deleteItem('${item._id}')" class="p-2 bg-red-600/20 text-red-400 rounded-md hover:bg-red-600 hover:text-white transition-all text-[10px] font-bold">DEL</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 py-10">Server Offline</p>`;
            }
        }

        function startEdit(item) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('form-heading').innerText = "Edit Product 🛠️";
            document.getElementById('main-btn').innerText = "Update Changes 🛠️";
            document.getElementById('cancel-btn').classList.remove('hidden');
            
            document.getElementById('edit-id').value = item._id;
            document.getElementById('pageType').value = item.pageType;
            document.getElementById('category').value = item.category || "";
            document.getElementById('title').value = item.title;
            document.getElementById('shortDesc').value = item.shortDesc || "";
            document.getElementById('longDesc').value = item.longDesc || "";
            document.getElementById('finalPrice').value = item.finalPrice;
            document.getElementById('originalPrice').value = item.originalPrice;
            document.getElementById('discount').value = item.discount || "";
            document.getElementById('rating').value = item.rating;
            document.getElementById('stock').value = item.stock;
            document.getElementById('src').value = item.src;
            document.getElementById('badge').value = item.badge || "";
            document.getElementById('subImages').value = (item.subImages || []).join(', ');
            document.getElementById('tags').value = (item.tags || []).join(', ');
        }

        async function deleteItem(id) {
            if(!confirm("Are you sure?")) return;
            try {
                const res = await fetch(`${API}/delete/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if(result.success) loadInventory();
            } catch (err) { alert("Delete failed!"); }
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-heading').innerText = "Add New Product";
            document.getElementById('main-btn').innerText = "Add Product 🚀";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
